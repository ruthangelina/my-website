<!DOCTYPE html>
<html>
  <head>
    <title>Our Family</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #fff8f0;
        padding: 40px;
      }
      h1 {
        color: #d4607a;
      }
      p {
        color: #555;
        font-size: 18px;
      }
      .photos {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
      }
      img {
        width: 300px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      }
    </style>
  </head>
  <body>
    <h1>Our Family 💕</h1>
    <p>A little corner of the internet for the people we love.</p>
    <div class="photos">
      <img src="kid1.jpg" alt="My child">
      <img src="kid2.jpg" alt="My child">
    </div>
  </body>
</html>
